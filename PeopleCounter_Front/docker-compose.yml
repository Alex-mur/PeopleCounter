services:
  peoplecounter-front:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:9000/
        # Замените localhost на внешний адрес сервера Manager
    container_name: peoplecounter-front
    restart: unless-stopped
    ports:
      - "8080:80"
