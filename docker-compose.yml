version: '3.8'

services:
  # 0. PostgreSQL Database
  peoplecounter-db:
    image: postgres:15-alpine
    container_name: peoplecounter-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 1. Frontend (Vue 3)
  peoplecounter-front:
    build:
      context: ./PeopleCounter_Front
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://${SERVER_IP}:${MANAGER_PORT}/
    container_name: peoplecounter-front
    restart: unless-stopped
    ports:
      - "${FRONT_PORT}:80"

  # 2. Manager (Go Backend)
  peoplecounter-manager:
    build:
      context: ./PeopleCounter_Manager
      dockerfile: Dockerfile
    image: peoplecounter-manager:latest
    container_name: peoplecounter-manager
    network_mode: "host"
    restart: unless-stopped
    volumes:
      - ./PeopleCounter_Manager/config.json:/workspace/config.json:ro
    depends_on:
      - peoplecounter-db

  # 3. Worker (Python / YOLO)
  peoplecounter-worker-y26:
    build:
      context: ./PeopleCounter_WorkerYOLO26
      dockerfile: Dockerfile
    container_name: people_counter_worker_y26
    network_mode: "host"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./PeopleCounter_WorkerYOLO26:/app

volumes:
  pgdata: 

